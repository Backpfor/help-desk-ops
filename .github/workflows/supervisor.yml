name: Supervision Agent

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Mon–Fri at 07:00 UTC
  workflow_dispatch:          # manual trigger

jobs:
  supervise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run supervision agent
        id: supervise
        run: python scripts/supervisor.py
        continue-on-error: true

      - name: Create GitHub Issue if problems found
        if: steps.supervise.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `⚠️ Supervision Alert – ${today}`,
              body:  `The supervision agent detected workflow issues on **${today}**.\n\nCheck the [Actions log](https://github.com/${context.repo.owner}/${context.repo.repo}/actions) for details.\n\n**Checklist:**\n- [ ] Reminders due reviewed\n- [ ] Priority backlog checked\n- [ ] Booking format corrected`,
              labels: ['supervision']
            });
